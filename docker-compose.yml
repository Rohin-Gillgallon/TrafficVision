services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

  api:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    ports: 
      - "8000:8000"
    env_file: .env
    depends_on: 
      - postgres
      - redis

  worker:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A src.worker.celery_app worker -l info -P solo
    env_file: .env
    depends_on: 
      - postgres
      - redis

  beat:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A src.worker.celery_app beat -l info
    env_file: .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgis/postgis:16-3.4
    ports: [ "5433:5432" ]
    environment:
      POSTGRES_DB: trafficcv
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes: [ pgdata:/var/lib/postgresql/data ]

  redis:
    image: redis:7-alpine
    ports: [ "6379:6379" ]

volumes:
  pgdata:
